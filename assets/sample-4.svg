<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b12"/>
      <stop offset="1" stop-color="#05070c"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="25%" r="60%">
      <stop offset="0" stop-color="#ff4d6d" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff4d6d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" fill="url(#grid)" opacity="0.55"/>
  <g fill="none" stroke="#ff4d6d" stroke-opacity="0.35">
    <path d="M100 620 C 220 520, 420 540, 560 430 S 880 320, 1100 220" stroke-width="3"/>
    <path d="M120 680 C 260 560, 460 590, 600 470 S 920 360, 1120 260" stroke-width="2"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
    <text x="72" y="120" font-size="44" fill="rgba(255,255,255,0.92)">Contact</text>
    <text x="72" y="170" font-size="22" fill="rgba(255,255,255,0.70)">Email • GitHub • LinkedIn</text>
    <text x="72" y="720" font-size="18" fill="rgba(255,255,255,0.55)">Replace this placeholder with your own image in /assets</text>
